# 推荐：用子域名部署，与现有博客完全隔离（互不影响）
#
# 1) DNS：为 ipo.example.com 添加 A 记录指向服务器 IP
# 2) 将 dist 内文件放到 /var/www/hk-ipo/（index.html 直接在该目录下）
# 3) 复制本文件到 /etc/nginx/sites-available/hk-ipo ，按需改 server_name 与路径
# 4) ln -s ... sites-enabled/  && nginx -t && systemctl reload nginx
# 5) certbot --nginx -d ipo.example.com   （建议上 HTTPS）

server {
    listen 80;
    listen [::]:80;
    server_name ipo.example.com;

    root /var/www/hk-ipo;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/hk-ipo.access.log;
    error_log  /var/log/nginx/hk-ipo.error.log;
}
