# 可选：与博客共用同一域名，挂在子路径 /hk-ipo/
#
# 构建时必须带 base：
#   VITE_BASE_PATH=/hk-ipo/ npm run build
#
# 将 dist 内所有文件放到「博客站点 root」下的 hk-ipo 目录。
# 例如博客 root 为 /var/www/blog ，则本应用文件应在：
#   /var/www/blog/hk-ipo/index.html
#   /var/www/blog/hk-ipo/assets/...
#
# 把下面 location 块合并进你博客已有的 server { ... } 里（不要改博客的 root 与其它 location）。

    location /hk-ipo/ {
        try_files $uri $uri/ /hk-ipo/index.html;
    }
