# 港股中签查询静态站（Vite SPA），与博客 Next 反代共存
# 安装：sudo cp 到 /etc/nginx/snippets/hk-ipo-static.conf ，并在 blog 的 server 内 include

# 无尾部斜杠时否则会落到 location / 被 Next 反代，出现 404
location = /hk-ipo {
    return 301 /hk-ipo/;
}

location /hk-ipo/ {
    alias /var/www/hk-ipo-app/;
    try_files $uri $uri/ /hk-ipo/index.html;
}
